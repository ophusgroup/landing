<title>COLab Gallery — local test</title>
<style>
  :root { color-scheme: light dark; }
  body { margin:0; font-family:-apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background:#ffffff; color:#1a1a1a; transition:background .2s, color .2s; }
  body.dark { background:#14171c; color:#e8eaed; }
  .page { max-width:860px; margin:0 auto; padding:28px 20px 90px; }
  .bar { display:flex; align-items:center; gap:12px; margin-bottom:6px; }
  .bar h1 { flex:1; font-size:1.35rem; margin:0; }
  button.toggle { padding:6px 12px; border:1px solid currentColor; border-radius:8px;
    background:transparent; color:inherit; cursor:pointer; font-size:.85rem; opacity:.8; }
  button.toggle:hover { opacity:1; }
  .hint { opacity:.65; font-size:.85rem; margin:0 0 26px; line-height:1.5; }
  .hint code { background:rgba(127,127,127,.16); padding:1px 5px; border-radius:4px; }
</style>
</head>

    <h1>COLab Gallery — local preview</h1>
    <button class="toggle" id="theme">Toggle dark</button>
  </div>

    (<code>image_base = /images/gallery</code>). Serve the repo root:
