<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESTEEM Logo Widget Test</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      padding: 40px;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: background 0.2s;
    }
    body.dark { background: #14181c; }
    #root { max-width: 760px; margin: 0 auto; }
    .controls { max-width: 760px; margin: 0 auto 24px; }
    button {
      font: inherit; padding: 6px 14px; border-radius: 6px;
      border: 1px solid #bbb; background: #f4f4f4; cursor: pointer;
    }
    body.dark button { background: #2a2f35; color: #eee; border-color: #555; }
  </style>
</head>
<body>
  <div class="controls">
    <button id="theme">Toggle dark mode</button>
  </div>
  <div id="root"></div>

  <script type="module">
    import widget from './esteem-logo.js';

    // Mock the model.get() interface MyST's anywidget provides. Empty params
    // exercise all the defaults (the as-shipped logo).
    const params = {};
    const model = { get: (key) => params[key] };

    widget.render({ model, el: document.getElementById('root') });

    // Theme toggle flips body background so the widget's luminance-based
    // dark-mode detection (and MutationObserver on <html>) fires.
    document.getElementById('theme').addEventListener('click', () => {
      document.body.classList.toggle('dark');
      // nudge the observer that watches documentElement attributes
      document.documentElement.toggleAttribute('data-theme-dark');
    });
  </script>
</body>
</html>
