<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STEM Hover Widget Test</title>
  <style>
    :root {
      color-scheme: dark light;
    }
    body {
      margin: 0;
      padding: 32px 20px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0e1318;
      color: #dfe6ee;
      transition: background 220ms ease, color 220ms ease;
    }
    body.light {
      background: #eef2ec;
      color: #203041;
    }
    .page {
      max-width: 1080px;
      margin: 0 auto;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.08);
      color: inherit;
      padding: 10px 14px;
      cursor: pointer;
    }
    body.light button {
      border-color: rgba(16,24,32,0.1);
      background: rgba(255,255,255,0.7);
    }
    p {
      margin: 0;
      color: inherit;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="toolbar">
      <p>Notebook-inspired STEM schematic: objective lens, focused probe, specimen, and diffraction plane.</p>
      <button id="theme-toggle">Toggle light / dark</button>
    </div>
    <div id="root"></div>
  </div>
  <script type="module">
    import widget from "./stem-hover-card.js";

    const params = {
      title: "Scanning Transmission Electron Microscopy",
      subtitle: "A focused electron probe scans a specimen and the transmitted scattering is recorded as a live diffraction response.",
      seed: 12,
    };

    const model = {
      get(key) {
        return params[key];
      },
    };

    widget.render({ model, el: document.getElementById("root") });

    document.getElementById("theme-toggle").addEventListener("click", () => {
      document.body.classList.toggle("light");
    });
  </script>
</body>
</html>
