<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STEM Hover Widget Test</title>
  <style>
    :root {
      color-scheme: dark light;
    }
    body {
      margin: 0;
      padding: 36px 20px 48px;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
      background:
        radial-gradient(circle at top, rgba(48, 88, 128, 0.18), transparent 36%),
        linear-gradient(180deg, #0b1016, #0d1118);
      color: #dfe6ee;
      transition: background 220ms ease, color 220ms ease;
    }
    body.light {
      background:
        radial-gradient(circle at top, rgba(123, 162, 202, 0.18), transparent 38%),
        linear-gradient(180deg, #f5f7f4, #edf2ee);
      color: #203041;
    }
    .page {
      max-width: 1100px;
      margin: 0 auto;
    }
    .intro {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .eyebrow {
      margin: 0 0 8px;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.72;
    }
    h1 {
      margin: 0;
      font-size: 21px;
      line-height: 1.05;
      letter-spacing: -0.03em;
    }
    .intro p {
      margin-top: 8px;
      max-width: 44ch;
      font-size: 13px;
      line-height: 1.5;
      opacity: 0.82;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    button {
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.07);
      color: inherit;
      padding: 10px 14px;
      cursor: pointer;
      font: inherit;
    }
    body.light button {
      border-color: rgba(16,24,32,0.1);
      background: rgba(255,255,255,0.76);
    }
    @media (max-width: 760px) {
      body {
        padding-top: 28px;
      }
      h1 {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="intro">
      <div>
        <div class="eyebrow">Widget Study</div>
        <h1>STEM instrument hover card</h1>
        <p>Hover the schematic to activate the probe scan and detector response.</p>
      </div>
      <div class="toolbar">
        <button id="theme-toggle">Toggle light / dark</button>
      </div>
    </div>
    <div id="root"></div>
  </div>
  <script type="module">
    import widget from "./stem-hover-card.js";

    const params = {
      title: "Scanning Transmission Electron Microscopy",
      subtitle: "A focused electron probe scans a specimen and the transmitted scattering is recorded as a live diffraction response.",
      seed: 12,
    };

    const model = {
      get(key) {
        return params[key];
      },
    };

    widget.render({ model, el: document.getElementById("root") });

    document.getElementById("theme-toggle").addEventListener("click", () => {
      document.body.classList.toggle("light");
    });
  </script>
</body>
</html>
